<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="リバーシ(オセロ)をブラウザで。AIの評価値と読み筋を盤上に重ね、形勢の推移と棋譜を見ながら検討できる"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f4f1ea" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#14160f" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>ishigaeshi | リバーシ</title>
    <script>
      // 描画前にテーマを確定させ、再読み込み時のちらつき(FOUC)を防ぐ。
      try {
        var t = localStorage.getItem('ishi-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <noscript>このゲームはブラウザ内で動作するため、JavaScriptを有効にしてください。</noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
